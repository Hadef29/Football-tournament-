<div class="container">

    <h1>🏆 Football Tournament Manager</h1>

    <nav class="tabs">
        <button onclick="showTab('teams')">👥 Teams</button>
        <button onclick="showTab('fixtures')">📅 Fixtures</button>
        <button onclick="showTab('standings')">📊 Standings</button>
        <button onclick="showTab('discipline')">🟨 Discipline</button>
    </nav>

    <section id="teams" class="tab">
        <h2>Teams</h2>

        <input id="teamName" placeholder="Enter team name">
        <button onclick="addTeam()">Add Team</button>

        <div id="teamList"></div>
    </section>

    <section id="fixtures" class="tab" style="display:none;">
        <h2>Fixtures</h2>

        <button onclick="generateFixtures()">
            Generate League Fixtures
        </button>

        <div id="fixtureList"></div>
    </section>

    <section id="standings" class="tab" style="display:none;">
        <h2>Standings</h2>

        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Team</th>
                    <th>P</th>
                    <th>W</th>
                    <th>D</th>
                    <th>L</th>
                    <th>GF</th>
                    <th>GA</th>
                    <th>GD</th>
                    <th>Pts</th>
                </tr>
            </thead>

            <tbody id="tableBody"></tbody>
        </table>

    </section>

    <section id="discipline" class="tab" style="display:none;">
        <h2>Discipline</h2>

        <div id="disciplineTable"></div>

    </section>

</div>

<script src="script.js"></script>
