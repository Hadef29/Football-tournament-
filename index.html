<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Tournament Manager</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<header class="header">

    <h1>🏆 Football Tournament Manager</h1>

    <p>Create • Play • Track • Champion</p>

</header>

<nav class="navbar">

    <button class="nav-btn active" onclick="showPage('dashboard')">
        <i class="fa-solid fa-house"></i>
        Dashboard
    </button>

    <button class="nav-btn" onclick="showPage('teams')">
        <i class="fa-solid fa-users"></i>
        Teams
    </button>

    <button class="nav-btn" onclick="showPage('fixtures')">
        <i class="fa-solid fa-futbol"></i>
        Fixtures
    </button>

    <button class="nav-btn" onclick="showPage('standings')">
        <i class="fa-solid fa-ranking-star"></i>
        Standings
    </button>

    <button class="nav-btn" onclick="showPage('discipline')">
        <i class="fa-solid fa-id-card"></i>
        Discipline
    </button>

</nav>

<main>

<!-- DASHBOARD -->

<section id="dashboard" class="page">

<div class="card">

<h2>League Dashboard</h2>

<div class="stats">

<div class="stat">
<h3 id="teamCount">0</h3>
<p>Teams</p>
</div>

<div class="stat">
<h3 id="matchCount">0</h3>
<p>Matches</p>
</div>

<div class="stat">
<h3 id="playedCount">0</h3>
<p>Played</p>
</div>

<div class="stat">
<h3 id="remainingCount">0</h3>
<p>Remaining</p>
</div>

</div>

</div>

</section>

<!-- TEAMS -->

<section id="teams" class="page" style="display:none;">

<div class="card">

<h2>Add Team</h2>

<div class="team-controls">

<input
type="text"
id="teamName"
placeholder="Enter Team Name">

<button onclick="addTeam()">
<i class="fa-solid fa-plus"></i>
Add Team
</button>

<button onclick="generateFixtures()">
<i class="fa-solid fa-calendar-days"></i>
Generate Fixtures
</button>

</div>

<div id="teamList">

</div>

</div>

</section>

<!-- FIXTURES -->

<section id="fixtures" class="page" style="display:none;">

<div class="card">

<h2>Fixtures</h2>

<div id="fixtureList">

<p>No fixtures generated.</p>

</div>

</div>

</section>

<!-- STANDINGS -->

<section id="standings" class="page" style="display:none;">

<div class="card">

<h2>League Table</h2>

<table>

<thead>

<tr>

<th>#</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</section>

<!-- DISCIPLINE -->

<section id="discipline" class="page" style="display:none;">

<div class="card">

<h2>Discipline</h2>

<table>

<thead>

<tr>

<th>Team</th>
<th>Yellow</th>
<th>Red</th>

</tr>

</thead>

<tbody id="disciplineBody">

</tbody>

</table>

</div>

</section>

</main>

<footer>

Football Tournament Manager © 2026

</footer>

<script src="script.js"></script>

</body>
</html>
