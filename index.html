<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Tournament Manager</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h1>🏆 Football Tournament Manager</h1>

<p>Create • Play • Track Standings</p>

</header>

<nav>

<button onclick="showPage('teams')">👥 Teams</button>

<button onclick="showPage('fixtures')">📅 Fixtures</button>

<button onclick="showPage('standings')">📊 Standings</button>

<button onclick="showPage('discipline')">🟨 Discipline</button>

</nav>

<main>

<section id="teams" class="page">

<div class="card">

<h2>Add Team</h2>

<input
id="teamName"
placeholder="Team Name">

<button onclick="addTeam()">
Add Team
</button>

<div id="teamList"></div>

</div>

</section>

<section
id="fixtures"
class="page"
style="display:none;">

<div class="card">

<h2>League Fixtures</h2>

<button onclick="generateFixtures()">

Generate Fixtures

</button>

<div id="fixtureList"></div>

</div>

</section>

<section
id="standings"
class="page"
style="display:none;">

<div class="card">

<h2>League Table</h2>

<table>

<thead>

<tr>

<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</section>

<section
id="discipline"
class="page"
style="display:none;">

<div class="card">

<h2>Discipline</h2>

<table>

<thead>

<tr>

<th>Team</th>
<th>Yellow</th>
<th>Red</th>

</tr>

</thead>

<tbody id="disciplineBody">

</tbody>

</table>

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
