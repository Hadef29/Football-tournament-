<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Tournament Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🏆 Football Tournament Manager</h1>

<div class="card">

<h2>Add Team</h2>

<input id="teamName" type="text" placeholder="Enter Team Name">

<button onclick="addTeam()">Add Team</button>

</div>

<div class="card">

<h2>League Table</h2>

<table>

<thead>

<tr>
<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<div class="card">

<h2>Fixtures</h2>

<div id="fixtures">
No fixtures generated yet.
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
